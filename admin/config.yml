backend:
  name: git-gateway
  branch: main # Ramificación a sincronizar

media_folder: "assets/images"
public_folder: "assets/images"

collections:
  - name: "config"
    label: "Configuración General"
    editor:
      preview: false
    files:
      - label: "Ajustes del Sitio"
        name: "settings"
        file: "data/config.json"
        fields:
          - {label: "Nombre de la Empresa", name: "company_name", widget: "string"}
          - {label: "WhatsApp", name: "whatsapp", widget: "string"}
          - {label: "Moneda", name: "currency", widget: "string", default: "USD"}
          - label: "Apariencia del Sitio"
            name: "appearance"
            widget: "object"
            fields:
              - {label: "Logo", name: "logo", widget: "image", required: false}
              - {label: "Ancho del Logo (px)", name: "logo_width", widget: "number", default: 120, value_type: "int"}
              - {label: "Alineación del Header", name: "header_align", widget: "select", options: [{label: "Izquierda", value: "left"}, {label: "Centro", value: "center"}, {label: "Derecha", value: "right"}], default: "center"}
              - {label: "Color de Acento", name: "accent_color", widget: "color", default: "#A0D94A"}
          - label: "Textos del Sitio"
            name: "texts"
            widget: "object"
            fields:
              - {label: "Título Principal / Slogan", name: "main_title", widget: "string", required: false}
              - {label: "Texto de Bienvenida", name: "description", widget: "text", required: false}
              - {label: "Créditos (Footer)", name: "footer_text", widget: "string", required: false}
              - {label: "Etiqueta de Botones", name: "button_label", widget: "string", default: "Cotizar ahora"}

          - label: "Administrador de Categorías"
            name: "categories"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - {label: "ID Único (en minúsculas, ej: laser)", name: "id", widget: "string"}
              - {label: "Nombre Visible", name: "name", widget: "string"}
              - {label: "Orden", name: "order", widget: "number", value_type: "int", default: 0}
              - {label: "Ícono (URL o SVG)", name: "icon", widget: "string", required: false}

  - name: "products"
    label: "Catálogo de Productos"
    folder: "content/productos"
    create: true
    extension: "md"
    format: "yaml-frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Descripción", name: "description", widget: "text"}
      - {label: "Precio", name: "price", widget: "number", value_type: "float"}
      - label: "Galería de Imágenes"
        name: "gallery"
        widget: "list"
        summary: '{{fields.image}}'
        field: {label: "Imagen", name: "image", widget: "image"}
      - label: "Imagen Principal"
        name: "image"
        widget: "image"
        required: false
      - label: "Categoría"
        name: "category"
        widget: "relation"
        collection: "config"
        file: "settings"
        search_fields: ["categories.*.name", "categories.*.id"]
        display_fields: ["categories.*.name"]
        value_field: "categories.*.id"
      - {label: "Subcategoría", name: "subcategory", widget: "string"}
