<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo E-Grafic</title>
    <meta name="description" content="Catálogo web minimalista y neuroestético">
    <!-- Google Fonts: Poppins and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <header>
        <div id="header-logo-container">
            <h1 id="header-title">E-Grafic</h1>
        </div>
        <p id="header-subtitle">Catálogo Minimalista</p>
    </header>
    <div class="layout-container">
        <aside class="sidebar">
            <h3>Categorías</h3>
            <nav id="category-menu">
                <!-- El menú anidado se renderizará aquí -->
            </nav>
        </aside>
        <main id="app">
            <!-- El contenido dinámico de productos irá aquí -->
        </main>
    </div>
    <footer>
        <div class="footer-content">
            <p>&copy; 2026 E-Grafic</p>
            <a href="/admin/" class="admin-link" aria-label="Acceso al CMS">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </a>
        </div>
    </footer>
    <script src="js/app.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
</body>
</html>
