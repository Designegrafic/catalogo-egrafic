<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo E-Grafic</title>
    <meta name="description" content="Catálogo web minimalista y neuroestético">
    <!-- Google Fonts: Poppins and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
    <style>
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <div id="header-logo-container">
            <h1 id="header-title">E-Grafic</h1>
        </div>
        <p id="header-subtitle">Catálogo Minimalista</p>
    </header>
    <div class="layout-container">
        <aside class="sidebar">
            <h3>Categorías</h3>
            <nav id="category-menu">
                <!-- El menú anidado se renderizará aquí -->
            </nav>
        </aside>
        <main id="app">
            <!-- Loading State mientras se hidratan los datos -->
            <div id="loading-spinner" style="display: flex; justify-content: center; align-items: center; height: 50vh; width: 100%;">
                <div style="width: 40px; height: 40px; border: 3px solid rgba(0, 162, 110, 0.2); border-top-color: var(--accent-color, #128C7E); border-radius: 50%; animation: spin 1s linear infinite;"></div>
            </div>
            <!-- El contenido dinámico de productos irá aquí -->
        </main>
    </div>
    <footer>
        <div class="footer-content">
            <p id="footer-text">&copy; 2026 E-Grafic</p>
            <a href="/admin/" class="admin-link" aria-label="Acceso al CMS">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </a>
        </div>
    </footer>
    
    <a href="#" id="floating-wa" class="floating-wa" aria-label="Gabinete WhatsApp">
        <svg viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.098.824z"/></svg>
    </a>

    <!-- Scripts en orden y con defer para no bloquear el renderizado -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/gh/mcstudios/glightbox/dist/js/glightbox.min.js" defer></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js" defer></script>
    <script src="js/app.js" defer></script>
    <script>
      // Retrasar Netlify Identity al load para ganar performance
      window.addEventListener("load", () => {
        if (window.netlifyIdentity) {
          window.netlifyIdentity.on("init", user => {
            if (!user) {
              window.netlifyIdentity.on("login", () => {
                document.location.href = "/admin/";
              });
            }
          });
        }
      });
    </script>
    <!-- Trigger Netlify Build Sync -->
</body>
</html>
