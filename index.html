<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Grafic | Agencia Creativa</title>

    <!-- Tailwind CSS para el diseño rápido y ligero -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Syne (Premium Headers) e Inter (Lectura limpia) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syne:wght@500;700;800&display=swap"
        rel="stylesheet">

    <!-- Phosphor Icons para iconos minimalistas -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Configuración de Tailwind Personalizada -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Syne', 'sans-serif'],
                    },
                    colors: {
                        agency: {
                            black: '#0a0a0c',
                            dark: '#141417',
                            gray: '#2a2a2f',
                            accent: '#ffffff',
                            muted: '#8e8e93'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Estilos personalizados ligeros */
        body {
            background-color: #0a0a0c;
            color: #ffffff;
        }

        .glass-nav {
            background: rgba(10, 10, 12, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-card {
            background: rgba(20, 20, 23, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        /* Ocultar scrollbar pero permitir scroll */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Animación de entrada de tarjetas */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeUp 0.6s ease forwards;
        }
    </style>
</head>

<body class="antialiased font-sans selection:bg-white selection:text-black">

    <!-- Navegación Sticky Glassmorphism -->
    <nav class="fixed w-full z-50 glass-nav transition-all duration-300" id="navbar">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="font-display font-bold text-2xl tracking-tighter uppercase flex items-center gap-2">
                <i class="ph-fill ph-aperture text-3xl"></i>
                E-Grafic
            </div>
            <a href="#contacto"
                class="hidden md:flex items-center gap-2 bg-white text-black px-5 py-2.5 rounded-full font-medium text-sm hover:bg-gray-200 transition-colors">
                Visita Técnica
                <i class="ph-bold ph-arrow-up-right"></i>
            </a>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="relative pt-32 pb-20 md:pt-48 md:pb-32 px-6 overflow-hidden">
        <div class="absolute inset-0 z-0">
            <!-- Gradiente de fondo sutil -->
            <div class="absolute top-0 right-0 w-96 h-96 bg-blue-900/20 rounded-full blur-[120px] mix-blend-screen">
            </div>
            <div class="absolute bottom-0 left-0 w-96 h-96 bg-purple-900/20 rounded-full blur-[120px] mix-blend-screen">
            </div>
        </div>

        <div class="max-w-7xl mx-auto relative z-10 text-center">
            <h1 class="font-display text-5xl md:text-7xl lg:text-8xl font-bold tracking-tighter leading-[1.1] mb-6">
                Elevamos tu <br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-400 to-gray-600">
                    Marca al Futuro.
                </span>
            </h1>
            <p class="text-agency-muted text-lg md:text-xl max-w-2xl mx-auto mb-10 font-light">
                Soluciones integrales de diseño, impresión y desarrollo espacial. Explora nuestro workspace digital
                interactivo.
            </p>
        </div>
    </header>

    <!-- Filtros de Categorías -->
    <section class="max-w-7xl mx-auto px-6 mb-12 sticky top-20 z-40">
        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-4 items-center justify-start md:justify-center"
            id="category-filters">
            <!-- Los botones se inyectan por JS -->
        </div>
    </section>

    <!-- Grid del Catálogo (Masonry Asimétrico) -->
    <main class="max-w-7xl mx-auto px-6 mb-32">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8" id="catalog-grid">
            <!-- Las tarjetas se inyectan por JS -->
        </div>
    </main>

    <!-- Footer Simple -->
    <footer id="contacto" class="border-t border-agency-gray py-12 px-6 mt-20">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="font-display font-bold text-xl uppercase tracking-tighter">
                E-Grafic Studio
            </div>
            <div class="flex gap-4">
                <a href="#"
                    class="w-10 h-10 rounded-full glass-card flex items-center justify-center hover:bg-white hover:text-black transition-all">
                    <i class="ph ph-instagram-logo text-xl"></i>
                </a>
                <a href="#"
                    class="w-10 h-10 rounded-full glass-card flex items-center justify-center hover:bg-white hover:text-black transition-all">
                    <i class="ph ph-whatsapp-logo text-xl"></i>
                </a>
                <a href="#"
                    class="w-10 h-10 rounded-full glass-card flex items-center justify-center hover:bg-white hover:text-black transition-all">
                    <i class="ph ph-envelope-simple text-xl"></i>
                </a>
            </div>
            <p class="text-agency-muted text-sm">© 2026 Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Modal de Producto (Pop-up Premium) -->
    <div id="product-modal"
        class="fixed inset-0 z-[100] hidden items-center justify-center p-4 sm:p-6 opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal()"></div>

        <div class="relative bg-agency-dark border border-agency-gray w-full max-w-4xl rounded-3xl overflow-hidden shadow-2xl flex flex-col md:flex-row transform scale-95 transition-transform duration-300"
            id="modal-content-box">

            <button onclick="closeModal()"
                class="absolute top-4 right-4 z-10 w-10 h-10 bg-black/50 backdrop-blur-md rounded-full flex items-center justify-center text-white hover:bg-white hover:text-black transition-colors">
                <i class="ph ph-x text-lg"></i>
            </button>

            <!-- Imagen Izquierda -->
            <div class="w-full md:w-1/2 h-64 md:h-[500px] relative">
                <img id="modal-img" src="" alt="Producto" class="w-full h-full object-cover">
            </div>

            <!-- Contenido Derecha -->
            <div class="w-full md:w-1/2 p-8 md:p-10 flex flex-col justify-center">
                <div id="modal-category" class="text-xs font-bold tracking-widest uppercase text-gray-400 mb-2"></div>
                <h2 id="modal-title" class="font-display text-3xl md:text-4xl font-bold mb-4"></h2>
                <p id="modal-desc" class="text-agency-muted mb-8 leading-relaxed"></p>

                <div class="mt-auto">
                    <div class="text-sm text-gray-400 mb-1">Inversión estimada</div>
                    <div id="modal-price" class="text-2xl font-display font-medium mb-6"></div>

                    <a href="https://wa.me/593990000000" target="_blank"
                        class="w-full flex items-center justify-center gap-2 bg-white text-black py-4 rounded-xl font-medium hover:bg-gray-200 transition-colors">
                        Solicitar Cotización <i class="ph-bold ph-arrow-up-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT PRINCIPAL: Lógica y Datos -->
    <script>
        /* * ==========================================
         * 1. DATOS DEL ADMINISTRADOR (Tus Categorías)
         * ==========================================
         */
        const workspaceData = [
            {
                id: 1,
                category: "Impresión",
                title: "Papelería Corporativa Premium",
                desc: "Tarjetas de presentación con acabados especiales, folletos, carpetas institucionales y papelería fina impresa en alta resolución.",
                price: "Desde $45.00",
                image: "https://images.unsplash.com/photo-1586281380349-632531db7ed4?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 2,
                category: "Impresión",
                title: "Gigantografías y Viniles",
                desc: "Impresión en gran formato para publicidad exterior e interior. Materiales duraderos y tintas UV.",
                price: "Cotizar por m²",
                image: "https://images.unsplash.com/photo-1541462608143-67571c6738dd?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 3,
                category: "Remodelaciones",
                title: "Interiorismo Comercial",
                desc: "Transformamos tu local comercial. Diseño de espacios, iluminación estratégica y mobiliario a medida para destacar tu marca.",
                price: "Previa Visita Técnica",
                image: "https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 4,
                category: "Remodelaciones",
                title: "Stands y Exhibidores",
                desc: "Construcción de stands impactantes para ferias y exhibidores de producto en puntos de venta.",
                price: "Previa Cotización",
                image: "https://images.unsplash.com/photo-1558442074-3c19857bc1dc?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 5,
                category: "Diseño de Marca 3D",
                title: "Letreros Corpóreos 3D",
                desc: "Letras en relieve en acrílico, MDF, acero inoxidable o PVC con iluminación LED frontal o retroiluminada.",
                price: "Desde $120.00",
                image: "https://images.unsplash.com/photo-1563206767-5b18f218e8de?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 6,
                category: "Diseño de Marca 3D",
                title: "Renders Arquitectónicos",
                desc: "Visualización 3D hiperrealista de proyectos comerciales antes de su construcción o remodelación.",
                price: "Desde $80.00 x Vista",
                image: "https://images.unsplash.com/photo-1600607686527-6fb886090705?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 7,
                category: "Herramientas Digitales",
                title: "Menús QR Dinámicos",
                desc: "Catálogos y menús digitales escaneables, actualizables en tiempo real sin necesidad de reimprimir.",
                price: "Plan Mensual / Anual",
                image: "https://images.unsplash.com/photo-1555421689-d68471e189f2?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 8,
                category: "Herramientas Digitales",
                title: "Desarrollo Web Agency",
                desc: "Páginas web corporativas de alto impacto, optimizadas para velocidad y diseño responsivo.",
                price: "Desde $350.00",
                image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=1000&auto=format&fit=crop"
            }
        ];

        /* * ==========================================
         * 2. LÓGICA DE LA INTERFAZ (No tocar)
         * ==========================================
         */
        const categories = ["Todos", "Impresión", "Remodelaciones", "Diseño de Marca 3D", "Herramientas Digitales"];
        let currentFilter = "Todos";

        // Renderizar Filtros
        function renderFilters() {
            const container = document.getElementById('category-filters');
            container.innerHTML = '';

            categories.forEach(cat => {
                const isActive = currentFilter === cat;
                const btn = document.createElement('button');
                btn.className = `px-6 py-2.5 rounded-full text-sm font-medium whitespace-nowrap transition-all duration-300 border ${isActive ? 'bg-white text-black border-white' : 'bg-transparent text-agency-muted border-agency-gray hover:border-gray-400 hover:text-white'}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    currentFilter = cat;
                    renderFilters();
                    renderGrid();
                };
                container.appendChild(btn);
            });
        }

        // Renderizar Cuadrícula de Productos
        function renderGrid() {
            const container = document.getElementById('catalog-grid');
            container.innerHTML = '';

            const filteredData = currentFilter === "Todos"
                ? workspaceData
                : workspaceData.filter(item => item.category === currentFilter);

            filteredData.forEach((item, index) => {
                // Alternar alturas para dar efecto asimétrico/masonry
                const heightClass = index % 3 === 0 ? "h-96" : "h-80 md:h-96";

                const card = document.createElement('div');
                // Retardo escalonado en la animación
                card.style.animationDelay = `${index * 0.1}s`;
                card.className = `group cursor-pointer rounded-2xl overflow-hidden glass-card relative flex flex-col justify-end p-6 animate-fade-up ${heightClass}`;
                card.onclick = () => openModal(item);

                card.innerHTML = `
                    <div class="absolute inset-0 w-full h-full">
                        <img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-agency-black via-black/40 to-transparent opacity-80 group-hover:opacity-90 transition-opacity"></div>
                    </div>
                    <div class="relative z-10 transform transition-transform duration-300 group-hover:-translate-y-2">
                        <span class="inline-block px-3 py-1 mb-3 text-[10px] font-bold tracking-widest uppercase border border-white/20 rounded-full backdrop-blur-md">
                            ${item.category}
                        </span>
                        <h3 class="font-display text-2xl font-bold leading-tight mb-1">${item.title}</h3>
                        <p class="text-sm text-gray-400 opacity-0 group-hover:opacity-100 transition-opacity duration-300 h-0 group-hover:h-auto overflow-hidden mt-2">
                            Ver detalles <i class="ph-bold ph-arrow-right align-middle"></i>
                        </p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Modal Logic
        const modal = document.getElementById('product-modal');
        const modalBox = document.getElementById('modal-content-box');

        function openModal(item) {
            document.getElementById('modal-img').src = item.image;
            document.getElementById('modal-category').textContent = item.category;
            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-desc').textContent = item.desc;
            document.getElementById('modal-price').textContent = item.price;

            modal.classList.remove('hidden');
            modal.classList.add('flex');

            // Animación de entrada
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalBox.classList.remove('scale-95');
                modalBox.classList.add('scale-100');
            }, 10);

            document.body.style.overflow = 'hidden'; // Bloquear scroll de fondo
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalBox.classList.remove('scale-100');
            modalBox.classList.add('scale-95');

            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.body.style.overflow = 'auto';
            }, 300);
        }

        // Efecto del Navbar al hacer scroll
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.classList.add('py-2');
                nav.classList.remove('py-4');
            } else {
                nav.classList.add('py-4');
                nav.classList.remove('py-2');
            }
        });

        // Iniciar
        renderFilters();
        renderGrid();
    </script>
</body>

</html>
