<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workspace | Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        egrafic: { DEFAULT: '#6DBB3B', light: '#88D455' },
                        admin: { bg: '#0f0f11', card: '#18181b', border: '#27272a' }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f0f11;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        .mobile-card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 20px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #6DBB3B;
            box-shadow: 0 0 0 1px #6DBB3B;
        }
    </style>
</head>

<body class="antialiased pb-24">

    <!-- App Bar Superior con botón para salir apuntando a ../index.html (para ir a la raíz) -->
    <header
        class="sticky top-0 z-50 bg-admin-bg/90 backdrop-blur-md border-b border-admin-border px-5 py-4 flex justify-between items-center">
        <a href="../index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
            <i class="ph-fill ph-aperture text-egrafic text-2xl"></i>
            <span class="font-semibold tracking-tight">Workspace</span>
        </a>
        <a href="../index.html"
            class="w-9 h-9 rounded-full bg-admin-card flex items-center justify-center border border-admin-border active:scale-95 transition-transform text-gray-400 hover:text-egrafic hover:border-egrafic"
            title="Volver al Catálogo">
            <i class="ph ph-sign-out text-xl"></i>
        </a>
    </header>

    <main class="p-5 space-y-6 max-w-md mx-auto">
        <div>
            <h1 class="text-2xl font-bold tracking-tight mb-1">Nuevo Producto</h1>
            <p class="text-gray-400 text-sm">Actualiza tu catálogo en segundos.</p>
        </div>

        <form class="space-y-5" id="admin-form" onsubmit="event.preventDefault(); guardarProducto();">
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-300 ml-1">Imagen (Cloudinary Automático)</label>
                <div id="drop-zone"
                    class="mobile-card border-dashed p-6 text-center cursor-pointer active:bg-zinc-800 transition-colors group">
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                    <div class="space-y-2" id="upload-prompt">
                        <div
                            class="w-14 h-14 bg-admin-border rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="ph ph-camera text-2xl text-egrafic"></i>
                        </div>
                        <p class="text-[15px] font-medium">Toca para subir foto</p>
                        <p class="text-xs text-gray-500 px-4">Se optimizará el peso automáticamente para no gastar
                            datos.</p>
                    </div>

                    <div id="preview-container" class="hidden relative w-full h-48 rounded-xl overflow-hidden">
                        <img id="image-preview" class="w-full h-full object-cover" src="">
                        <div
                            class="absolute bottom-3 right-3 bg-black/70 backdrop-blur-sm px-3 py-1.5 rounded-full flex items-center gap-1">
                            <i class="ph ph-arrows-clockwise text-xs"></i>
                            <span class="text-xs font-medium">Cambiar</span>
                        </div>
                    </div>
                </div>
                <input type="hidden" id="cloudinary-url-input" required>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-300 ml-1">Categoría</label>
                <select id="producto-categoria"
                    class="w-full bg-admin-card border border-admin-border text-white text-[15px] rounded-xl px-4 py-3.5 appearance-none"
                    required>
                    <option value="" disabled selected>Selecciona una categoría...</option>
                    <option value="Impresión">Impresión</option>
                    <option value="Remodelaciones">Remodelaciones</option>
                    <option value="Diseño de Marca 3D">Diseño de Marca 3D</option>
                    <option value="Herramientas Digitales">Herramientas Digitales</option>
                </select>
                <i class="ph ph-caret-down absolute right-8 mt-[14px] text-gray-400 pointer-events-none"></i>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-300 ml-1">Título del Producto / Servicio</label>
                <input type="text" id="producto-titulo" placeholder="Ej: Letreros 3D Luminosos"
                    class="w-full bg-admin-card border border-admin-border text-white text-[15px] rounded-xl px-4 py-3.5 placeholder-gray-600"
                    required>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-300 ml-1">Precio o Inversión</label>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-gray-500 font-medium">$</span>
                    <input type="text" id="producto-precio" placeholder="0.00 o 'Previa Cotización'"
                        class="w-full bg-admin-card border border-admin-border text-white text-[15px] rounded-xl pl-8 pr-4 py-3.5 placeholder-gray-600"
                        required>
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-300 ml-1">Descripción corta</label>
                <textarea id="producto-desc" rows="3" placeholder="Detalles principales..."
                    class="w-full bg-admin-card border border-admin-border text-white text-[15px] rounded-xl px-4 py-3.5 placeholder-gray-600 resize-none"
                    required></textarea>
            </div>

            <div class="fixed bottom-0 left-0 w-full p-5 bg-gradient-to-t from-admin-bg via-admin-bg to-transparent">
                <button type="submit"
                    class="w-full max-w-md mx-auto block bg-egrafic text-white font-semibold text-[16px] py-4 rounded-2xl shadow-[0_8px_20px_rgba(109,187,59,0.3)] active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
                    <i class="ph-bold ph-check-circle text-xl"></i>
                    Publicar en Catálogo
                </button>
            </div>

            <div class="h-8"></div>
        </form>
    </main>

    <script>
        // ¡No olvides cambiar esto luego por tus datos reales de Cloudinary!
        const CLOUD_NAME = "TU_CLOUD_NAME";
        const UPLOAD_PRESET = "TU_UPLOAD_PRESET_UNSIGNED";

        const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const urlInput = document.getElementById('cloudinary-url-input');
        const previewContainer = document.getElementById('preview-container');
        const imagePreview = document.getElementById('image-preview');
        const uploadPrompt = document.getElementById('upload-prompt');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        async function handleFile(file) {
            if (!file) return;
            uploadPrompt.innerHTML = `
                <div class="w-14 h-14 bg-admin-border rounded-full flex items-center justify-center mx-auto mb-3">
                    <i class="ph ph-spinner animate-spin text-2xl text-egrafic"></i>
                </div>
                <p class="text-[15px] font-medium text-egrafic">Optimizando foto...</p>
            `;
            uploadPrompt.classList.remove('hidden');
            previewContainer.classList.add('hidden');

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            try {
                const response = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                const data = await response.json();

                if (data.secure_url) {
                    const optimizedUrl = data.secure_url.replace('/upload/', '/upload/f_auto,q_auto/');
                    urlInput.value = optimizedUrl;
                    imagePreview.src = optimizedUrl;
                    uploadPrompt.classList.add('hidden');
                    previewContainer.classList.remove('hidden');
                }
            } catch (error) {
                console.error(error);
                uploadPrompt.innerHTML = `<div class="w-14 h-14 bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-3"><i class="ph ph-warning-circle text-2xl text-red-500"></i></div><p class="text-[15px] font-medium text-red-400">Error al subir</p>`;
            }
        }

        function guardarProducto() {
            if (!urlInput.value) { alert("Sube una imagen primero."); return; }
            const btn = document.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> Publicando...';
            btn.classList.add('opacity-80');

            setTimeout(() => {
                btn.innerHTML = '<i class="ph-fill ph-check-circle text-xl"></i> ¡Publicado!';
                btn.classList.replace('bg-egrafic', 'bg-white');
                btn.classList.replace('text-white', 'text-black');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-white', 'bg-egrafic');
                    btn.classList.replace('text-black', 'text-white');
                    btn.classList.remove('opacity-80');
                    document.getElementById('admin-form').reset();
                    urlInput.value = "";
                    previewContainer.classList.add('hidden');
                    uploadPrompt.classList.remove('hidden');
                    uploadPrompt.innerHTML = `<div class="w-14 h-14 bg-admin-border rounded-full flex items-center justify-center mx-auto mb-3"><i class="ph ph-camera text-2xl text-egrafic"></i></div><p class="text-[15px] font-medium">Toca para subir foto</p>`;
                }, 2000);
            }, 1500);
        }
    </script>
</body>

</html>
