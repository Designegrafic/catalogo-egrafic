<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Grafic | Agencia Creativa</title>

    <!-- Tailwind CSS para el diseño rápido y ligero -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Syne (Premium Headers) e Inter (Lectura limpia) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@500;700;800&display=swap"
        rel="stylesheet">

    <!-- Phosphor Icons para iconos minimalistas -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Configuración de Tailwind Personalizada -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Syne', 'sans-serif'],
                    },
                    colors: {
                        egrafic: {
                            DEFAULT: '#6DBB3B', // Verde principal de tu logo
                            light: '#88D455',   // Verde brillante para efectos hover
                            dark: '#4A8A24',    // Verde oscuro para profundidad
                        },
                        agency: {
                            black: '#0a0a0c',
                            dark: '#141417',
                            gray: '#2a2a2f',
                            accent: '#6DBB3B',
                            muted: '#8e8e93'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0a0a0c;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        /* Efecto cristal (Glassmorphism) */
        .glass-nav {
            background: rgba(10, 10, 12, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-card {
            background: rgba(20, 20, 23, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Hover de tarjetas con brillo verde sutil de tu marca */
        @media (hover: hover) {
            .glass-card:hover {
                border-color: rgba(109, 187, 59, 0.3);
                box-shadow: 0 10px 30px -10px rgba(109, 187, 59, 0.15);
                transform: translateY(-4px);
            }
        }

        /* Ocultar scrollbar pero permitir deslizar filtros en móvil */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Animación suave de entrada de tarjetas */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeUp 0.5s ease forwards;
        }
    </style>
</head>

<body class="antialiased font-sans selection:bg-egrafic selection:text-black">

    <!-- Navegación Glassmorphism superior -->
    <nav class="fixed w-full top-0 left-0 z-50 glass-nav transition-all duration-300" id="navbar">
        <div class="max-w-7xl mx-auto px-5 py-4 flex justify-between items-center">
            <!-- Nombre de marca con logo estilizado -->
            <div class="font-display font-bold text-2xl tracking-tighter uppercase flex items-center gap-2">
                <i class="ph-fill ph-aperture text-egrafic text-3xl"></i>
                E-Grafic
            </div>

            <!-- Botón de Visita Técnica (Visible en tablet/escritorio) -->
            <a href="#contacto"
                class="hidden md:flex items-center gap-2 bg-white text-black px-5 py-2.5 rounded-full font-medium text-sm hover:bg-egrafic hover:text-white transition-colors duration-300 shadow-[0_0_0_rgba(109,187,59,0)] hover:shadow-[0_0_15px_rgba(109,187,59,0.4)]">
                Visita Técnica
                <i class="ph-bold ph-arrow-up-right"></i>
            </a>
        </div>
    </nav>

    <!-- Hero / Encabezado Principal -->
    <header class="relative pt-32 pb-16 md:pt-44 md:pb-28 px-5 overflow-hidden">
        <div class="absolute inset-0 z-0 pointer-events-none">
            <!-- Luces difusas con el color corporativo verde de tu logo -->
            <div
                class="absolute top-[-10%] right-[-5%] w-[350px] h-[350px] md:w-[500px] md:h-[500px] bg-egrafic-dark/15 rounded-full blur-[100px] md:blur-[130px] mix-blend-screen">
            </div>
            <div
                class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] md:w-[600px] md:h-[600px] bg-egrafic/10 rounded-full blur-[120px] md:blur-[150px] mix-blend-screen">
            </div>
        </div>

        <div class="max-w-7xl mx-auto relative z-10 text-center">
            <h1
                class="font-display text-4xl sm:text-5xl md:text-7xl lg:text-8xl font-bold tracking-tighter leading-[1.1] mb-5">
                Elevamos tu <br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-white via-white to-egrafic">
                    Marca al Futuro.
                </span>
            </h1>
            <p class="text-agency-muted text-base md:text-xl max-w-xl mx-auto mb-8 font-light leading-relaxed">
                Soluciones integrales de diseño, impresión y desarrollo espacial. Explora nuestro catálogo interactivo.
            </p>
        </div>
    </header>

    <!-- Filtros de Categorías horizontales con deslizamiento en celular -->
    <section class="max-w-7xl mx-auto px-5 mb-8 sticky top-[72px] z-40">
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-3 items-center justify-start md:justify-center"
            id="category-filters">
            <!-- Inyectados por Javascript -->
        </div>
    </section>

    <!-- Cuadrícula del Catálogo -->
    <main class="max-w-7xl mx-auto px-5 mb-24">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-7" id="catalog-grid">
            <!-- Inyectados por Javascript -->
        </div>
    </main>

    <!-- Footer Simple con el Candado Secreto para Administrador -->
    <footer id="contacto" class="border-t border-agency-gray py-10 px-5 relative overflow-hidden">
        <div
            class="absolute bottom-0 center w-full h-px bg-gradient-to-r from-transparent via-egrafic/40 to-transparent">
        </div>

        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-6 relative z-10">
            <div class="font-display font-bold text-lg uppercase tracking-tighter flex items-center gap-2">
                <i class="ph-fill ph-aperture text-egrafic"></i> E-Grafic Studio
            </div>

            <!-- Redes Sociales -->
            <div class="flex gap-3">
                <a href="#"
                    class="w-10 h-10 rounded-full glass-card flex items-center justify-center hover:bg-egrafic hover:text-white hover:border-egrafic transition-all active:scale-95">
                    <i class="ph ph-instagram-logo text-lg"></i>
                </a>
                <a href="#"
                    class="w-10 h-10 rounded-full glass-card flex items-center justify-center hover:bg-egrafic hover:text-white hover:border-egrafic transition-all active:scale-95">
                    <i class="ph ph-whatsapp-logo text-lg"></i>
                </a>
                <a href="#"
                    class="w-10 h-10 rounded-full glass-card flex items-center justify-center hover:bg-egrafic hover:text-white hover:border-egrafic transition-all active:scale-95">
                    <i class="ph ph-envelope-simple text-lg"></i>
                </a>
            </div>

            <!-- Derechos y Candado -->
            <div class="flex items-center gap-3">
                <p class="text-agency-muted text-sm">© 2026 Todos los derechos reservados.</p>
                <!-- Candado Secreto verde que apunta a admin/index.html dentro de tu carpeta admin -->
                <a href="admin/index.html"
                    class="text-gray-700 opacity-45 hover:opacity-100 hover:text-egrafic transition-all duration-300 transform hover:scale-110 p-1"
                    title="Workspace Admin">
                    <i class="ph-fill ph-lock-key text-lg"></i>
                </a>
            </div>
        </div>
    </footer>

    <!-- Modal de Vista Detallada de Productos -->
    <div id="product-modal"
        class="fixed inset-0 z-[100] hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/85 backdrop-blur-md" onclick="closeModal()"></div>

        <div class="relative bg-agency-dark border border-agency-gray w-full max-w-4xl rounded-3xl overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.6)] flex flex-col md:flex-row transform scale-95 transition-transform duration-300 z-10"
            id="modal-content-box">

            <!-- Línea de luz sutil arriba del modal con tu verde corporativo -->
            <div
                class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-egrafic to-transparent opacity-60 z-20">
            </div>

            <!-- Botón Cerrar (Tamaño táctil optimizado para móviles) -->
            <button onclick="closeModal()"
                class="absolute top-4 right-4 z-30 w-11 h-11 bg-black/60 backdrop-blur-md rounded-full flex items-center justify-center text-white hover:bg-egrafic hover:text-white transition-colors active:scale-90">
                <i class="ph ph-x text-xl"></i>
            </button>

            <!-- Imagen Izquierda -->
            <div class="w-full md:w-1/2 h-56 sm:h-72 md:h-[480px] relative">
                <img id="modal-img" src="" alt="Producto" class="w-full h-full object-cover">
            </div>

            <!-- Contenido del Producto (Derecha) -->
            <div class="w-full md:w-1/2 p-6 sm:p-8 md:p-10 flex flex-col justify-center">
                <div id="modal-category" class="text-xs font-bold tracking-widest uppercase text-egrafic mb-2"></div>
                <h2 id="modal-title" class="font-display text-2xl sm:text-3xl font-bold mb-3 tracking-tight"></h2>
                <p id="modal-desc" class="text-agency-muted text-sm sm:text-base mb-6 leading-relaxed font-light"></p>

                <div class="mt-auto">
                    <div class="text-xs text-gray-500 mb-0.5">Inversión estimada</div>
                    <div id="modal-price" class="text-xl sm:text-2xl font-display font-medium mb-5 text-white"></div>

                    <!-- Botón WhatsApp (Grande y táctil para móviles) -->
                    <a href="https://wa.me/593990000000" target="_blank"
                        class="w-full flex items-center justify-center gap-2 bg-egrafic text-white py-3.5 rounded-xl font-semibold text-[15px] hover:bg-egrafic-light transition-all active:scale-98 shadow-[0_0_0_rgba(109,187,59,0)] hover:shadow-[0_8px_20px_rgba(109,187,59,0.3)]">
                        Solicitar Cotización
                        <i class="ph-bold ph-whatsapp-logo text-xl"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- LÓGICA DEL CATÁLOGO -->
    <script>
        /* * ==========================================
         * 1. DATOS DEL ADMINISTRADOR (Tus Categorías)
         * ==========================================
         */
        const workspaceData = [
            {
                id: 1,
                category: "Impresión",
                title: "Papelería Corporativa Premium",
                desc: "Tarjetas de presentación con acabados especiales, folletos institucionales, carpetas y papelería fina en alta resolución.",
                price: "Desde $45.00",
                image: "https://images.unsplash.com/photo-1586281380349-632531db7ed4?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 2,
                category: "Impresión",
                title: "Gigantografías y Viniles",
                desc: "Impresión en gran formato para publicidad exterior e interior. Materiales de alta resistencia y tintas UV duraderas.",
                price: "Cotizar por m²",
                image: "https://images.unsplash.com/photo-1541462608143-67571c6738dd?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 3,
                category: "Remodelaciones",
                title: "Interiorismo Comercial",
                desc: "Transformamos locales comerciales. Diseño de espacios ergonómicos, iluminación de alta gama y mobiliario exclusivo.",
                price: "Previa Visita Técnica",
                image: "https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 4,
                category: "Remodelaciones",
                title: "Stands y Exhibidores",
                desc: "Arquitectura efímera de impacto para ferias corporativas y exhibidores publicitarios de punto de venta.",
                price: "Previa Cotización",
                image: "https://images.unsplash.com/photo-1558442074-3c19857bc1dc?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 5,
                category: "Diseño de Marca 3D",
                title: "Letreros Corpóreos 3D",
                desc: "Letras volumétricas en acrílico, MDF, acero inoxidable o PVC con iluminación LED directa o retroiluminada.",
                price: "Desde $120.00",
                image: "https://images.unsplash.com/photo-1563206767-5b18f218e8de?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 6,
                category: "Diseño de Marca 3D",
                title: "Renders Arquitectónicos",
                desc: "Modelado y visualización 3D fotorrealista de proyectos comerciales antes de su ejecución material.",
                price: "Desde $80.00 x Vista",
                image: "https://images.unsplash.com/photo-1600607686527-6fb886090705?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 7,
                category: "Herramientas Digitales",
                title: "Menús QR Dinámicos",
                desc: "Catálogos interactivos escaneables para locales comerciales y restaurantes, administrables sin reimpresión.",
                price: "Plan Mensual / Anual",
                image: "https://images.unsplash.com/photo-1555421689-d68471e189f2?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 8,
                category: "Herramientas Digitales",
                title: "Desarrollo Web Agency",
                desc: "Sitios corporativos y portafolios interactivos diseñados para cargar ultra rápido con interfaces fluidas.",
                price: "Desde $350.00",
                image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=1000&auto=format&fit=crop"
            }
        ];

        /* * ==========================================
         * 2. LÓGICA DE RENDERIZADO (Mobile-First)
         * ==========================================
         */
        const categories = ["Todos", "Impresión", "Remodelaciones", "Diseño de Marca 3D", "Herramientas Digitales"];
        let currentFilter = "Todos";

        // Renderizar Filtros
        function renderFilters() {
            const container = document.getElementById('category-filters');
            container.innerHTML = '';

            categories.forEach(cat => {
                const isActive = currentFilter === cat;
                const btn = document.createElement('button');
                btn.className = `px-5 py-2 rounded-full text-xs sm:text-sm font-semibold whitespace-nowrap transition-all duration-300 border ${isActive ? 'bg-egrafic text-white border-egrafic shadow-[0_0_12px_rgba(109,187,59,0.35)]' : 'bg-transparent text-agency-muted border-agency-gray hover:border-egrafic hover:text-white active:scale-95'}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    currentFilter = cat;
                    renderFilters();
                    renderGrid();
                };
                container.appendChild(btn);
            });
        }

        // Renderizar Cuadrícula del Catálogo
        function renderGrid() {
            const container = document.getElementById('catalog-grid');
            container.innerHTML = '';

            const filteredData = currentFilter === "Todos"
                ? workspaceData
                : workspaceData.filter(item => item.category === currentFilter);

            filteredData.forEach((item, index) => {
                // Alternar alturas para dar dinamismo al catálogo
                const heightClass = index % 3 === 0 ? "h-80 md:h-96" : "h-72 md:h-80";

                const card = document.createElement('div');
                card.style.animationDelay = `${index * 0.08}s`;
                card.className = `group cursor-pointer rounded-2xl overflow-hidden glass-card relative flex flex-col justify-end p-5 animate-fade-up active:scale-98 ${heightClass}`;
                card.onclick = () => openModal(item);

                card.innerHTML = `
                    <div class="absolute inset-0 w-full h-full">
                        <img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" loading="lazy">
                        <div class="absolute inset-0 bg-gradient-to-t from-agency-black via-black/45 to-transparent opacity-85 group-hover:opacity-95 transition-opacity"></div>
                    </div>
                    <div class="relative z-10 transform transition-transform duration-300">
                        <span class="inline-block px-2.5 py-0.5 mb-2.5 text-[10px] font-bold tracking-widest uppercase border border-egrafic/40 text-egrafic-light rounded-full backdrop-blur-md bg-egrafic/10">
                            ${item.category}
                        </span>
                        <h3 class="font-display text-xl sm:text-2xl font-bold leading-tight text-white mb-1 group-hover:text-egrafic-light transition-colors">${item.title}</h3>
                        <p class="text-xs text-egrafic-light flex items-center gap-1 opacity-80 group-hover:opacity-100 transition-opacity mt-1.5 font-medium">
                            Ver más detalles <i class="ph-bold ph-arrow-right"></i>
                        </p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Controladores del Modal
        const modal = document.getElementById('product-modal');
        const modalBox = document.getElementById('modal-content-box');

        function openModal(item) {
            document.getElementById('modal-img').src = item.image;
            document.getElementById('modal-category').textContent = item.category;
            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-desc').textContent = item.desc;
            document.getElementById('modal-price').textContent = item.price;

            modal.classList.remove('hidden');
            modal.classList.add('flex');

            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalBox.classList.remove('scale-95');
                modalBox.classList.add('scale-100');
            }, 10);

            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalBox.classList.remove('scale-100');
            modalBox.classList.add('scale-95');

            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.body.style.overflow = 'auto';
            }, 300);
        }

        // Efecto del Navbar al hacer Scroll
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 40) {
                nav.classList.add('py-2.5', 'shadow-[0_10px_30px_rgba(0,0,0,0.6)]');
                nav.classList.remove('py-4');
            } else {
                nav.classList.add('py-4');
                nav.classList.remove('py-2.5', 'shadow-[0_10px_30px_rgba(0,0,0,0.6)]');
            }
        });

        // Inicio automático
        renderFilters();
        renderGrid();
    </script>
</body>

</html>
